name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'cybersec-saas' }}

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate required deployment vars
        run: |
          set -euo pipefail
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "Missing required repository variable: GCP_PROJECT_ID"
            exit 1
          fi

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          gcloud config set project "${{ vars.GCP_PROJECT_ID }}"
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --source . \
            --region "${{ env.GCP_REGION }}" \
            --allow-unauthenticated \
            --quiet

      - name: Show service URL
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" --region "${{ env.GCP_REGION }}" --format='value(status.url)')
          echo "Deployed URL: ${URL}"
